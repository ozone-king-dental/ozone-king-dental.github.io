<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unsubscribed</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: #f6f8fb;
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: #ffffff;
      border-radius: 18px;
      padding: 36px 28px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(17, 24, 39, 0.08);
      border: 1px solid #e5e7eb;
    }

    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: #ecfdf5;
      color: #059669;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: bold;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 26px;
      line-height: 1.2;
      font-weight: 700;
    }

    p {
      margin: 0;
      font-size: 16px;
      line-height: 1.6;
      color: #6b7280;
    }

    .footer {
      margin-top: 24px;
      font-size: 13px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon">✓</div>
    <h1>You have been successfully unsubscribed</h1>
    <p>You will no longer receive these emails.</p>
    <div class="footer">This change may take a short time to fully process.</div>
  </main>
</body>
</html>
